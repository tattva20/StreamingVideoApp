name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: iOS Tests
    runs-on: macos-26
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        # Prefer Xcode 26.5, fall back to the image default
        if [ -d "/Applications/Xcode_26.5.app" ]; then
          sudo xcode-select -s /Applications/Xcode_26.5.app
        else
          sudo xcode-select -s /Applications/Xcode.app
        fi
        xcodebuild -version

    - name: List Available Simulators
      run: xcrun simctl list devices available

    - name: Run iOS Tests
      run: |
        set -o pipefail
        xcodebuild test \
          -workspace StreamingVideoApp.xcworkspace \
          -scheme CI_iOS \
          -destination 'platform=iOS Simulator,name=iPhone 17,OS=26.5' \
          -enableThreadSanitizer YES \
          -resultBundlePath TestResults-iOS.xcresult \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty --color || true

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: ios-test-results
        path: TestResults-iOS.xcresult

  build-macos:
    name: macOS Tests
    runs-on: macos-26
    timeout-minutes: 20

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        if [ -d "/Applications/Xcode_26.5.app" ]; then
          sudo xcode-select -s /Applications/Xcode_26.5.app
        else
          sudo xcode-select -s /Applications/Xcode.app
        fi
        xcodebuild -version

    - name: Run macOS Tests
      run: |
        set -o pipefail
        xcodebuild test \
          -workspace StreamingVideoApp.xcworkspace \
          -scheme CI_macOS \
          -destination 'platform=macOS' \
          -enableThreadSanitizer YES \
          -resultBundlePath TestResults-macOS.xcresult \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty --color || true

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: macos-test-results
        path: TestResults-macOS.xcresult
