<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 236" role="img" aria-labelledby="t d" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <title id="t">Thumbnail loading states</title>
  <desc id="d">Two feed cells: the top shows a shimmer placeholder while its thumbnail loads; the bottom shows the loaded image with a done checkmark.</desc>
  <defs>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e9ecf0"/><stop offset="0.5" stop-color="#f4f6f8"/><stop offset="1" stop-color="#e9ecf0"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="558" height="234" rx="18" fill="#f7f8fa" stroke="#e4e7eb"/>
  <!-- loading cell -->
  <rect x="20" y="20" width="520" height="92" rx="12" fill="#ffffff" stroke="#eceef1"/>
  <rect x="34" y="34" width="116" height="64" rx="8" fill="url(#shimmer)"/>
  <rect x="46" y="50" width="92" height="9" rx="4" fill="#dfe3e8"/>
  <rect x="46" y="66" width="70" height="9" rx="4" fill="#e7eaee"/>
  <rect x="46" y="82" width="82" height="9" rx="4" fill="#eef1f4"/>
  <text x="172" y="54" font-size="14" font-weight="600" fill="#1f2933">Video Title</text>
  <rect x="172" y="66" width="180" height="8" rx="4" fill="#eef1f4"/>
  <g transform="translate(456,60)">
    <path d="M6 -9 a9 9 0 1 1 -6 2.4" fill="none" stroke="#98a2b3" stroke-width="2.6" stroke-linecap="round"/>
    <text x="16" y="4" font-size="11" font-weight="600" fill="#98a2b3">Loading…</text>
  </g>
  <!-- loaded cell -->
  <rect x="20" y="124" width="520" height="92" rx="12" fill="#ffffff" stroke="#eceef1"/>
  <rect x="34" y="138" width="116" height="64" rx="8" fill="#cdd4dc"/>
  <g transform="translate(74,158)" stroke="#93a0ad" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="0" width="36" height="26" rx="3"/>
    <path d="M0 20 l11 -11 8 8 6 -6 11 9"/>
    <circle cx="10" cy="8" r="3.2" fill="#93a0ad" stroke="none"/>
  </g>
  <text x="172" y="158" font-size="14" font-weight="600" fill="#1f2933">Video Title</text>
  <rect x="172" y="170" width="180" height="8" rx="4" fill="#e7eaee"/>
  <g transform="translate(452,164)">
    <circle cx="6" cy="0" r="9" fill="#12a150"/>
    <path d="M2 0 l3 3 5 -6" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="20" y="4" font-size="11" font-weight="600" fill="#12a150">Loaded</text>
  </g>
</svg>
