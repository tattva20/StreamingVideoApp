<svg viewBox="0 0 560 410" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>StreamingCore Architecture Layers</title>
  <rect x="0.5" y="0.5" width="559" height="409" rx="14" fill="#ffffff" stroke="#e8eaed" stroke-width="1"/>

  <text x="280" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#202124">StreamingCore · Architecture Layers</text>
  <text x="280" y="54" text-anchor="middle" font-size="12" fill="#5f6368">dependencies point inward to the Domain</text>

  <!-- Presentation -->
  <rect x="70" y="76" width="360" height="60" rx="9" fill="#e8f0fe" stroke="#4285f4" stroke-width="2"/>
  <text x="250" y="102" text-anchor="middle" font-size="14" font-weight="700" fill="#202124">Presentation Layer</text>
  <text x="250" y="121" text-anchor="middle" font-size="11" fill="#5f6368">ViewModels · Presenters · Mappers</text>

  <!-- Use Case -->
  <rect x="70" y="146" width="360" height="60" rx="9" fill="#fef7e0" stroke="#f9ab00" stroke-width="2"/>
  <text x="250" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="#202124">Use Case Layer</text>
  <text x="250" y="191" text-anchor="middle" font-size="11" fill="#5f6368">Loaders · Services · Coordinators</text>

  <!-- Domain (highlighted core) -->
  <rect x="70" y="216" width="360" height="60" rx="9" fill="#e6f4ea" stroke="#34a853" stroke-width="2.5"/>
  <text x="250" y="242" text-anchor="middle" font-size="14" font-weight="700" fill="#202124">Domain Layer</text>
  <text x="250" y="261" text-anchor="middle" font-size="11" fill="#5f6368">Models · Protocols · Value Types</text>

  <!-- Infrastructure -->
  <rect x="70" y="286" width="360" height="60" rx="9" fill="#f1f3f4" stroke="#9aa0a6" stroke-width="2"/>
  <text x="250" y="312" text-anchor="middle" font-size="14" font-weight="700" fill="#202124">Infrastructure Layer</text>
  <text x="250" y="331" text-anchor="middle" font-size="11" fill="#5f6368">HTTP Client · CoreData · FileSystem</text>

  <!-- inward-dependency arrows -->
  <defs>
    <marker id="dep" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#34a853"/>
    </marker>
  </defs>
  <line x1="470" y1="106" x2="470" y2="240" stroke="#34a853" stroke-width="1.5" marker-end="url(#dep)"/>
  <line x1="470" y1="316" x2="470" y2="252" stroke="#34a853" stroke-width="1.5" marker-end="url(#dep)"/>
  <text x="497" y="230" text-anchor="middle" font-size="10" fill="#9aa0a6" transform="rotate(90 497 230)">depend on Domain</text>

  <text x="250" y="384" text-anchor="middle" font-size="10.5" fill="#9aa0a6">No import UIKit / AppKit anywhere in StreamingCore</text>
</svg>
