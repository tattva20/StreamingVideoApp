<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 384" role="img" aria-labelledby="t d" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif">
  <title id="t">Video Feed screen</title>
  <desc id="d">A paginated video feed: rows of thumbnail, title, description and duration, with a "Loading more" footer.</desc>
  <rect x="1" y="1" width="518" height="382" rx="18" fill="#f7f8fa" stroke="#e4e7eb"/>
  <rect x="16" y="16" width="488" height="352" rx="12" fill="#ffffff" stroke="#eceef1"/>
  <!-- header -->
  <text x="36" y="48" font-size="17" font-weight="700" fill="#1f2933">Video Feed</text>
  <line x1="16" y1="66" x2="504" y2="66" stroke="#eceef1"/>
  <!-- row template -->
  <g>
    <!-- row 1 -->
    <rect x="32" y="82" width="456" height="82" rx="10" fill="#fbfcfd" stroke="#e8ebef"/>
    <rect x="44" y="94" width="104" height="58" rx="8" fill="#d7dce2"/>
    <circle cx="96" cy="123" r="15" fill="#ffffff" opacity="0.92"/>
    <path d="M91 115 l12 8 -12 8 z" fill="#e5484d"/>
    <text x="168" y="108" font-size="14" font-weight="600" fill="#1f2933">Title</text>
    <rect x="168" y="120" width="210" height="8" rx="4" fill="#e7eaee"/>
    <rect x="168" y="134" width="150" height="8" rx="4" fill="#eef1f4"/>
    <text x="404" y="154" font-size="11" font-weight="600" fill="#98a2b3" text-anchor="end">2:34</text>
  </g>
  <g>
    <!-- row 2 -->
    <rect x="32" y="176" width="456" height="82" rx="10" fill="#fbfcfd" stroke="#e8ebef"/>
    <rect x="44" y="188" width="104" height="58" rx="8" fill="#d7dce2"/>
    <circle cx="96" cy="217" r="15" fill="#ffffff" opacity="0.92"/>
    <path d="M91 209 l12 8 -12 8 z" fill="#e5484d"/>
    <text x="168" y="202" font-size="14" font-weight="600" fill="#1f2933">Title</text>
    <rect x="168" y="214" width="210" height="8" rx="4" fill="#e7eaee"/>
    <rect x="168" y="228" width="150" height="8" rx="4" fill="#eef1f4"/>
    <text x="404" y="248" font-size="11" font-weight="600" fill="#98a2b3" text-anchor="end">5:12</text>
  </g>
  <text x="260" y="286" font-size="15" font-weight="700" fill="#c3c9d2" text-anchor="middle">· · ·</text>
  <!-- loading more footer -->
  <rect x="32" y="304" width="456" height="48" rx="10" fill="#fafbfc" stroke="#eceef1"/>
  <path d="M244 328 a12 12 0 1 1 -0.01 0" fill="none" stroke="#e5484d" stroke-width="3" stroke-linecap="round" stroke-dasharray="40 20"/>
  <text x="266" y="333" font-size="13" font-weight="600" fill="#98a2b3">Loading more…</text>
</svg>
