<svg viewBox="0 0 560 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <title>StreamingCoreiOS Architecture</title>
  <rect x="0.5" y="0.5" width="559" height="399" rx="14" fill="#ffffff" stroke="#e8eaed" stroke-width="1"/>

  <text x="280" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#202124">StreamingCoreiOS · Architecture</text>

  <!-- StreamingCoreiOS box -->
  <rect x="60" y="56" width="440" height="196" rx="11" fill="#fef7e0" stroke="#f9ab00" stroke-width="2.5"/>
  <text x="280" y="82" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">StreamingCoreiOS</text>
  <text x="280" y="100" text-anchor="middle" font-size="11" fill="#5f6368">UIKit Views &amp; Platform Adapters</text>
  <line x1="280" y1="116" x2="280" y2="238" stroke="#f9ab00" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- UI Components column -->
  <text x="170" y="138" text-anchor="middle" font-size="12.5" font-weight="700" fill="#202124">UI Components</text>
  <text x="170" y="162" text-anchor="middle" font-size="11" fill="#5f6368">ViewControllers</text>
  <text x="170" y="182" text-anchor="middle" font-size="11" fill="#5f6368">Custom Views</text>
  <text x="170" y="202" text-anchor="middle" font-size="11" fill="#5f6368">Controls</text>

  <!-- Platform Adapters column -->
  <text x="390" y="138" text-anchor="middle" font-size="12.5" font-weight="700" fill="#202124">Platform Adapters</text>
  <text x="390" y="162" text-anchor="middle" font-size="11" fill="#5f6368">AVPlayerStateAdapter</text>
  <text x="390" y="182" text-anchor="middle" font-size="11" fill="#5f6368">NetworkQualityMonitor</text>
  <text x="390" y="202" text-anchor="middle" font-size="11" fill="#5f6368">OSLogLogger</text>

  <!-- dependency arrow -->
  <defs>
    <marker id="dep2" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#34a853"/>
    </marker>
  </defs>
  <line x1="280" y1="252" x2="280" y2="292" stroke="#34a853" stroke-width="2" marker-end="url(#dep2)"/>
  <text x="312" y="276" text-anchor="middle" font-size="10.5" fill="#5f6368">depends on</text>

  <!-- StreamingCore box -->
  <rect x="60" y="300" width="440" height="64" rx="11" fill="#e6f4ea" stroke="#34a853" stroke-width="2.5"/>
  <text x="280" y="328" text-anchor="middle" font-size="15" font-weight="700" fill="#202124">StreamingCore</text>
  <text x="280" y="347" text-anchor="middle" font-size="11" fill="#5f6368">Platform-Agnostic Protocols</text>
</svg>
